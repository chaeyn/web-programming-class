<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    const month = Number(prompt("계절을 알고싶은 달을 입력해주세요"));

    if (month >= 3 && month <= 5) {
        console.log("봄입니다")
    } else if (month >= 6 && month <= 8) {
        console.log("여름입니다.")
    } else if (month >= 9 && month <= 11) {
        console.log("가을입니다.")
    } else {
        console.log("겨울입니다.")
    }
    </script>
</body>
</html>
