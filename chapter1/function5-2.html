<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        function callJob(callback) {
            console.log("---작업을 시작합니다---");

            callback();

            console.log("---작업이 끝났습니다---");
        }

        callJob(function() {
            console.log("실세 심부름 내용 수행 중...")
        })
    </script>
</body>
</html>
