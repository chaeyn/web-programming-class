<!DOCTYPE html>
<html lang="en">
<head>
    <title>Number함수</title>
</head>
<body>
    <script>
        let num = "263";
        num = Number(num);
        console.log(typeof(num))

        console.log(Boolean(false))
        console.log(Boolean(""))
        console.log(Boolean(0))
        console.log(Boolean(NaN))
        console.log(Boolean(null))
        console.log(Boolean(undefined))

        console.log(2 + "3", typeof(2 + "3"))
        console.log(2 - "3", typeof(2 - "3"))
        console.log(2 * "3", typeof(2 * "3"))
        console.log(2 / "3", typeof(2 / "3"))
    </script>    
</body>
</html>
