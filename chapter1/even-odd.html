<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const n = prompt("자연수 N을 입력하세요");
        let odd = 0;
        let even = 0;
        for (i = 1; i <= n; i++) {
            i % 2 == 0 ? even += i : odd += i;
        }
        document.write(`<span>짝수 합계: ${even}</span><br>`)
        document.write(`<span>홀수 합계: ${odd}</span>`)
    </script>
</body>
</html>
